<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투두 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #6366f1;
    }

    button.add-btn {
      padding: 10px 18px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover {
      background: #4f46e5;
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: transparent;
      font-size: 13px;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    li:last-child {
      border-bottom: none;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 15px;
      color: #374151;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #9ca3af;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    li .delete-btn:hover {
      color: #ef4444;
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #9ca3af;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }

    .clear-btn:hover {
      color: #ef4444;
    }

    .empty {
      text-align: center;
      color: #d1d5db;
      padding: 32px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>할 일 목록</h1>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요..." />
      <button class="add-btn" onclick="addTodo()">추가</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <ul id="todoList"></ul>
    <div class="empty" id="emptyMsg" style="display:none;">항목이 없습니다.</div>

    <div class="footer">
      <span id="countMsg"></span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    const input = document.getElementById('todoInput');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function createTodoItem(todo) {
      const li = document.createElement('li');
      if (todo.done) li.classList.add('done');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = todo.done;
      checkbox.addEventListener('change', () => toggleTodo(todo.id));

      const span = document.createElement('span');
      span.textContent = todo.text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = '✕';
      deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(deleteBtn);
      return li;
    }

    function render() {
      const list = document.getElementById('todoList');
      const emptyMsg = document.getElementById('emptyMsg');
      const countMsg = document.getElementById('countMsg');

      const filtered = todos.filter(t =>
        filter === 'all' ? true :
        filter === 'active' ? !t.done :
        t.done
      );

      list.replaceChildren(...filtered.map(createTodoItem));

      const remaining = todos.filter(t => !t.done).length;
      countMsg.textContent = `${remaining}개 남음`;
      emptyMsg.style.display = filtered.length === 0 ? 'block' : 'none';
    }

    render();
  </script>
</body>
</html>
