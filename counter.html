<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카운터 앱</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-10 flex flex-col items-center gap-8 w-80">
    <h1 class="text-2xl font-bold text-gray-700">카운터</h1>

    <div id="count" class="text-7xl font-extrabold text-blue-600 w-40 text-center tabular-nums">
      0
    </div>

    <div class="flex gap-4">
      <button
        onclick="decrement()"
        class="w-14 h-14 rounded-full bg-blue-100 text-blue-700 text-2xl font-bold hover:bg-blue-200 active:scale-95 transition-all"
      >−</button>

      <button
        onclick="reset()"
        class="px-5 h-14 rounded-full bg-blue-500 text-white text-sm font-semibold hover:bg-blue-600 active:scale-95 transition-all shadow"
      >리셋</button>

      <button
        onclick="increment()"
        class="w-14 h-14 rounded-full bg-blue-100 text-blue-700 text-2xl font-bold hover:bg-blue-200 active:scale-95 transition-all"
      >+</button>
    </div>
  </div>

  <script>
    let count = 0;
    const display = document.getElementById('count');

    function update() {
      display.textContent = count;
      display.className = `text-7xl font-extrabold w-40 text-center tabular-nums transition-colors ${
        count > 0 ? 'text-blue-600' : count < 0 ? 'text-red-500' : 'text-blue-600'
      }`;
    }

    function increment() { count++; update(); }
    function decrement() { count--; update(); }
    function reset()     { count = 0; update(); }
  </script>
</body>
</html>
