<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스톱워치</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-900 flex items-center justify-center">
  <div class="flex flex-col items-center gap-10">

    <!-- 시간 표시 -->
    <div class="bg-gray-800 rounded-3xl px-14 py-10 shadow-2xl flex flex-col items-center gap-2">
      <span class="text-gray-400 text-sm font-medium tracking-widest uppercase">Stopwatch</span>
      <div id="display" class="text-7xl font-mono font-bold text-white tracking-tight">
        00:00:00
      </div>
      <div id="ms-display" class="text-2xl font-mono text-gray-400">
        .00
      </div>
    </div>

    <!-- 버튼 -->
    <div class="flex gap-5">
      <button
        id="startPauseBtn"
        onclick="toggleStartPause()"
        class="w-36 h-14 rounded-full bg-green-500 hover:bg-green-400 active:scale-95 text-white font-bold text-lg transition-all shadow-lg"
      >시작</button>

      <button
        onclick="resetTimer()"
        class="w-36 h-14 rounded-full bg-gray-600 hover:bg-gray-500 active:scale-95 text-white font-bold text-lg transition-all shadow-lg"
      >리셋</button>
    </div>

  </div>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let timerID = null;
    let running = false;

    const display   = document.getElementById('display');
    const msDisplay = document.getElementById('ms-display');
    const btn       = document.getElementById('startPauseBtn');

    function pad(n, len = 2) {
      return String(n).padStart(len, '0');
    }

    function render(ms) {
      const h   = Math.floor(ms / 3600000);
      const m   = Math.floor((ms % 3600000) / 60000);
      const s   = Math.floor((ms % 60000) / 1000);
      const cs  = Math.floor((ms % 1000) / 10);   // 센티초 (1/100 초)

      display.textContent   = `${pad(h)}:${pad(m)}:${pad(s)}`;
      msDisplay.textContent = `.${pad(cs)}`;
    }

    function toggleStartPause() {
      if (!running) {
        // 시작
        startTime = Date.now() - elapsed;
        timerID = setInterval(() => {
          elapsed = Date.now() - startTime;
          render(elapsed);
        }, 30);
        btn.textContent = '일시정지';
        btn.className = btn.className.replace('bg-green-500 hover:bg-green-400', 'bg-yellow-500 hover:bg-yellow-400');
        running = true;
      } else {
        // 일시정지
        clearInterval(timerID);
        btn.textContent = '계속';
        btn.className = btn.className.replace('bg-yellow-500 hover:bg-yellow-400', 'bg-green-500 hover:bg-green-400');
        running = false;
      }
    }

    function resetTimer() {
      clearInterval(timerID);
      elapsed = 0;
      running = false;
      render(0);
      btn.textContent = '시작';
      btn.className = btn.className
        .replace('bg-yellow-500 hover:bg-yellow-400', 'bg-green-500 hover:bg-green-400');
    }
  </script>
</body>
</html>
